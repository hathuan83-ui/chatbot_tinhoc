<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Trợ lí AI hỗ trợ học sinh học Tin học 10</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app-shell">
    <aside class="sidebar">
      <div class="brand">
        <div class="brand-icon">AI</div>
        <div>
          <h1>Trợ lí AI Tin học 10</h1>
          <p>Kết nối tri thức</p>
        </div>
      </div>

      <div class="panel">
        <h3>Chế độ hỗ trợ</h3>
        <div class="mode-list">
          <button class="mode-btn active" data-mode="hoc-bai">Học bài</button>
          <button class="mode-btn" data-mode="trac-nghiem">Câu trắc nghiệm</button>
          <button class="mode-btn" data-mode="de-kiem-tra">Đề kiểm tra</button>
        </div>
      </div>

      <div class="panel">
        <h3>Câu hỏi gợi ý</h3>
        <div class="suggestions" id="suggestions"></div>
      </div>

      <div class="panel">
        <h3>Tiện ích</h3>
        <div class="tool-buttons">
          <button id="clearBtn">Xóa hội thoại</button>
          <button id="exportBtn">Xuất TXT</button>
        </div>
      </div>
    </aside>

    <main class="main-chat">
      <header class="topbar">
        <div>
          <h2 id="modeTitle">Chế độ: Học bài</h2>
          <p>Hỗ trợ học sinh ôn tập Tin học 10 theo sách Kết nối tri thức với cuộc sống</p>
        </div>
      </header>

      <section id="chatbox" class="chatbox">
        <div class="message bot">
          <div class="avatar">AI</div>
          <div class="bubble">
            Xin chào! Mình có thể giúp bạn học lý thuyết, tạo câu trắc nghiệm và ra đề kiểm tra môn Tin học 10.
          </div>
        </div>
      </section>

      <form class="input-area" id="chatForm">
        <textarea id="userInput" placeholder="Nhập câu hỏi về Tin học 10..." rows="1"></textarea>
        <button type="submit" id="sendBtn">Gửi</button>
      </form>
    </main>
  </div>

  <script src="script.js"></script>
</body>
</html>
