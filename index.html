<script>

function send(){

var input=document.getElementById("question");
var text=input.value.toLowerCase();

if(text=="") return;

var chat=document.getElementById("chatbox");

chat.innerHTML += "<div class='message user'>"+text+"</div>";

var reply="Tôi chưa hiểu câu hỏi. Hãy hỏi về Python lớp 10.";

if(text.includes("print")){
reply="Hàm print() dùng để in dữ liệu ra màn hình. Ví dụ: print('Hello')";
}

else if(text.includes("biến")){
reply="Biến dùng để lưu dữ liệu. Ví dụ: x = 10";
}

else if(text.includes("input")){
reply="Hàm input() dùng để nhập dữ liệu từ bàn phím.";
}

else if(text.includes("python")){
reply="Python là ngôn ngữ lập trình phổ biến và dễ học.";
}

chat.innerHTML += "<div class='message bot'>"+reply+"</div>";

input.value="";

chat.scrollTop=chat.scrollHeight;

}

</script>
