<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>AI Chatbot</title>

<style>

body{
margin:0;
font-family:Arial;
background:#343541;
color:white;
}

header{
background:#202123;
padding:15px;
text-align:center;
font-size:20px;
}

#chatbox{
height:80vh;
overflow-y:auto;
padding:20px;
}

.message{
max-width:700px;
margin:10px auto;
padding:12px;
border-radius:8px;
}

.user{
background:#444654;
}

.bot{
background:#343541;
border:1px solid #555;
}

#input-area{
position:fixed;
bottom:0;
width:100%;
background:#202123;
padding:15px;
display:flex;
justify-content:center;
}

#question{
width:60%;
padding:12px;
font-size:16px;
border-radius:6px;
border:none;
}

button{
padding:12px 20px;
margin-left:10px;
background:#10a37f;
color:white;
border:none;
border-radius:6px;
cursor:pointer;
}

</style>

</head>

<body>

<header>AI Chatbot</header>

<div id="chatbox"></div>

<div id="input-area">
<input id="question" placeholder="Nhập câu hỏi..." onkeypress="enter(event)">
<button onclick="send()">Gửi</button>
</div>

<script>

const API_KEY="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";

async function send(){

let input=document.getElementById("question")
let text=input.value

if(!text) return

let chat=document.getElementById("chatbox")

chat.innerHTML+=`<div class="message user">${text}</div>`

input.value=""

let res=await fetch("https://api.openai.com/v1/chat/completions",{

method:"POST",

headers:{
"Content-Type":"application/json",
"Authorization":"Bearer "+API_KEY
},

body:JSON.stringify({
model:"gpt-4o-mini",
messages:[{role:"user",content:text}]
})

})

let data=await res.json()

let reply=data.choices[0].message.content

chat.innerHTML+=`<div class="message bot">${reply}</div>`

chat.scrollTop=chat.scrollHeight

}

function enter(e){
if(e.key==="Enter") send()
}

</script>

</body>
</html>
