<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Chatbot Tin học 10</title>

<style>

body{
font-family: Arial;
background:#f5f5f5;
margin:0;
}

header{
background:#10a37f;
color:white;
padding:15px;
text-align:center;
font-size:20px;
}

#chatbox{
height:400px;
overflow-y:auto;
padding:15px;
background:white;
}

.message{
margin:10px 0;
}

.user{
text-align:right;
color:blue;
}

.bot{
text-align:left;
color:black;
}

#input-area{
display:flex;
padding:10px;
background:#eee;
}

#question{
flex:1;
padding:10px;
font-size:16px;
}

button{
padding:10px 20px;
background:#10a37f;
color:white;
border:none;
cursor:pointer;
}

</style>
</head>

<body>

<header>
Chatbot AI Tin học 10
</header>

<div id="chatbox"></div>

<div id="input-area">
<input id="question" placeholder="Nhập câu hỏi Python...">
<button onclick="send()">Gửi</button>
</div>

<script>

function send(){

var input=document.getElementById("question");
var text=input.value;

if(text=="") return;

var chat=document.getElementById("chatbox");

chat.innerHTML += "<div class='message user'>"+text+"</div>";

var reply="Tôi đang học để trả lời câu hỏi Tin học.";

if(text.includes("print")){
reply="Trong Python: print() dùng để in ra màn hình.";
}

if(text.includes("biến")){
reply="Biến dùng để lưu dữ liệu. Ví dụ: x = 10";
}

chat.innerHTML += "<div class='message bot'>"+reply+"</div>";

input.value="";

chat.scrollTop=chat.scrollHeight;

}

</script>

</body>
</html>
